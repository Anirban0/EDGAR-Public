name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scala:
    name: Scala build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Compile & test
        run: sbt -batch test

  python:
    name: edgar-worker (Python) test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edgar-worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Sync & test
        run: |
          uv sync --dev
          uv run pytest

  web:
    name: web (Next.js) build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
