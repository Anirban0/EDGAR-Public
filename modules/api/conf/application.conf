# edgar-api application configuration.
# Secrets come from the environment only (see CLAUDE.md hard rule 6).

play.application.name = "edgar-api"

# Dev-only fallback secret; production MUST supply APPLICATION_SECRET via env.
play.http.secret.key = "changeme-dev-only-secret-do-not-use-in-prod"
play.http.secret.key = ${?APPLICATION_SECRET}

play.i18n.langs = ["en"]

# The api's Anthropic key is distinct from any Claude Code auth (hard rule 6).
# anthropic.api.key = ${?ANTHROPIC_API_KEY}
